services:
  # ──────────────── 应用服务 ────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zwq-testcases
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    volumes:
      # SQLite 数据库持久化
      - sqlite-data:/data
      # CLIP ONNX 模型目录 — 把你本机的模型目录映射到这里
      - D:/SW/Tools/clip-onnx:/models/clip-onnx:ro
      # 图片目录 — 把你本机的图片目录映射到这里
      - D:/Images:/data/images:ro
    depends_on: []
    restart: unless-stopped

volumes:
  sqlite-data:
