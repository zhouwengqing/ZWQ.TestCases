services:
  # ──────────────── 应用服务 ────────────────
  app:
    image: ${APP_IMAGE:-47.106.235.211:5000/zwq/mq-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zwq-testcases
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${APP_ENV:-Docker}
    volumes:
      # SQLite 数据库持久化
      - sqlite-data:/data
      # CLIP ONNX 模型目录
      - ${CLIP_MODEL_DIR:-/opt/models/clip-onnx}:/models/clip-onnx:ro
      # 图片目录
      - ${IMAGE_DIR:-/opt/images}:/data/images:ro
    restart: unless-stopped

volumes:
  sqlite-data:
